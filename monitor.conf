# =============================================================================
# /opt/hostmon/config/monitor.conf
# Hostmon — Web Hosting Investigation Suite
# =============================================================================
# All scripts source this file. Edit here only.
# =============================================================================

# -----------------------------------------------------------------------------
# GENERAL
# -----------------------------------------------------------------------------
HOSTMON_VERSION="1.0.0"
LOG_DIR="/var/log/hostmon"
LOG_RETENTION_DAYS=30
TIMESTAMP_FORMAT="%Y-%m-%d %H:%M:%S"

# -----------------------------------------------------------------------------
# SLACK
# -----------------------------------------------------------------------------
SLACK_ENABLED=true
SLACK_WEBHOOK_URL="https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
SLACK_USERNAME="HostMon"
SLACK_CHANNEL="#server-alerts"

# -----------------------------------------------------------------------------
# WHM / CPANEL API
# -----------------------------------------------------------------------------
WHM_API_TOKEN="YOUR_WHM_API_TOKEN_HERE"
WHM_HOST="localhost"
WHM_PORT="2087"
WHM_PROTO="https"

# How to generate a token:
# WHM → Development → API Tokens → Generate Token
# Give it: list-accts, accountsummary, stat permissions at minimum

# -----------------------------------------------------------------------------
# INVESTIGATION THRESHOLDS
# -----------------------------------------------------------------------------

# CPU — per-process % to flag as suspicious
CPU_PROC_THRESHOLD=20           # Flag any single process using >20% CPU

# Resource audit — how many top accounts to show
TOP_ACCOUNTS_COUNT=10

# Disk — file age threshold for dry-run cleanup candidates
DISK_OLD_LOG_DAYS=14            # Logs older than 14 days
DISK_OLD_TMP_DAYS=3             # /tmp files older than 3 days
DISK_OLD_BACKUP_DAYS=7          # Old backup files older than 7 days

# Minimum file size to report in disk scan (reduces noise)
DISK_MIN_FILE_SIZE="10M"

# Disk — paths scanned per account (relative to /home/USERNAME)
DISK_SCAN_PATHS=(
    "logs"
    "public_html"
    "mail"
    "tmp"
    "backups"
    ".trash"
)

# CSF / Imunify
CSF_LOG="/var/log/lfd.log"
IMUNIFY_LOG="/var/log/imunify360/console.log"
FIREWALL_LOOKBACK_MINUTES=60    # How far back to analyze firewall logs

# IPs blocked in last window to consider "pattern attack"
ATTACK_PATTERN_THRESHOLD=10
